name: Build, Test & Deploy EV Station

on:
  push:
    branches: [ main ]

env:
  AWS_REGION: us-east-1
  ARTIFACT_BUCKET: "ev-station-artifacts-4e19553c"
  LOGS_BUCKET: "ev-station-logs-4e19553c"

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        run: docker build -t ev-station:test .

      - name: Test website in container
        run: |
          docker run -d -p 8080:80 --name test-ev ev-station:test
          sleep 5
          curl --fail http://localhost:8080 || exit 1
          docker stop test-ev && docker rm test-ev

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Upload static site to S3
        run: |
          aws s3 sync ./website/ s3://${{ env.ARTIFACT_BUCKET }}/website/ --delete

  deploy:
    needs: build-test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Install Ansible & dependencies
        run: |
          sudo apt update
          sudo apt install -y ansible python3-pip
          pip3 install boto3 botocore

      - name: Set up SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_PRIVATE_KEY }}" > ~/ev-key.pem
          chmod 400 ~/ev-key.pem

      - name: Run Ansible playbook
        run: |
          cd ansible
          ansible-playbook playbook.yml \
            --extra-vars "s3_bucket=${{ env.ARTIFACT_BUCKET }} logs_bucket=${{ env.LOGS_BUCKET }}"
