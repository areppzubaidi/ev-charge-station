- name: Configure EV station web servers
  hosts: ev_servers
  become: yes
  tasks:
    - name: Update apt cache
      apt:
        update_cache: yes
        cache_valid_time: 3600

    - name: Install nginx
      apt:
        name: nginx
        state: present

    - name: Ensure nginx is running
      service:
        name: nginx
        state: started
        enabled: yes

    - name: Create web root
      file:
        path: /var/www/html
        state: directory
        owner: ubuntu
        group: ubuntu

    - name: Download website from S3
      shell: |
        aws s3 sync s3://{{ s3_bucket }}/website/ /var/www/html/ --delete
      args:
        executable: /bin/bash
      environment:
        AWS_REGION: us-east-1

    - name: Set permissions
      file:
        path: /var/www/html
        recurse: yes
        owner: www-data
        group: www-data

    - name: Restart nginx
      service:
        name: nginx
        state: restarted
